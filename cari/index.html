<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Search</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

<style>
:root {
    --pico-spacing: 1rem;
}

main {
    max-width: 960px;
    margin: 2rem auto;
}

#search-form {
    display: flex;
    gap: .5rem;
    align-items: center;
    margin-bottom: 1rem;
}

#query {
    flex: 1;
    width: auto;
    margin: 0;
}

#search-form button {
    flex: 0 0 auto;
    width: auto;
    margin: 0;
    white-space: nowrap;
}

.gsc-control-cse,
.gsc-control-searchresults-only {
    border: 0 !important;
    padding: 0 !important;
    background: transparent !important;
}

.gsc-results-wrapper-visible {
    margin-top: 1rem;
}
</style>

<script async src="https://cse.google.com/cse.js?cx=470bfb11830904f83"></script>
</head>
<body>

<main class="container">

<form id="search-form">
    <input
        id="query"
        type="search"
        placeholder="Search..."
        autocomplete="off">

    <button type="submit">
        Search
    </button>
</form>

<div class="gcse-searchresults-only"></div>

</main>

<script>
const input = document.getElementById("query");
const form = document.getElementById("search-form");

const params = new URLSearchParams(location.search);
const initialQuery = params.get("q") || "";

input.value = initialQuery;

function executeSearch(query) {
    history.replaceState(
        {},
        "",
        query
            ? "?q=" + encodeURIComponent(query)
            : location.pathname
    );

    const trySearch = () => {
        if (
            window.google &&
            google.search &&
            google.search.cse &&
            google.search.cse.element
        ) {
            const element =
                google.search.cse.element.getElement("searchresults-only0");

            if (element) {
                element.execute(query);
                return true;
            }
        }

        return false;
    };

    if (!trySearch()) {
        const timer = setInterval(() => {
            if (trySearch()) {
                clearInterval(timer);
            }
        }, 100);
    }
}

form.addEventListener("submit", e => {
    e.preventDefault();

    const q = input.value.trim();

    if (!q)
        return;

    executeSearch(q);
});

if (initialQuery) {
    executeSearch(initialQuery);
}
</script>

</body>
</html>
