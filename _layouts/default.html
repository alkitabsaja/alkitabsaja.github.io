<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  {% if site.favicon %}
  <link rel="icon" href="{{ site.favicon | relative_url }}">
  {% endif %}

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script>
    (() => {
      const saved = localStorage.getItem("theme");
      if (saved) {
        document.documentElement.dataset.theme = saved;
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.dataset.theme = "dark";
      } else {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
</head>

<body>

<div class="container">

<nav class="nav">

<a class="nav-brand" href="{{ '/' | relative_url }}">
{% if site.logo %}
<img class="nav-logo" src="{{ site.logo | relative_url }}" alt="">
{% endif %}
<span>{{ site.title }}</span>
</a>

<div class="nav-links">
{% for item in site.nav %}
<a href="{{ item.url | relative_url }}"
{% if page.url == item.url %}class="active"{% endif %}>
{{ item.title }}
</a>
{% endfor %}

<button id="theme-toggle" class="theme-toggle" title="Toggle theme">
<i class="bi bi-moon-stars"></i>
</button>

</div>

</nav>

<main data-pagefind-body class="content">
{% if page.collection == "docs" %}
<button id="toc-toggle" class="toc-toggle">
    <i class="bi bi-list"></i>
    <span>Contents</span>
</button>

<nav id="toc" class="toc" hidden>
    <strong>Contents</strong>
    <ul id="toc-list"></ul>
</nav>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const toc = document.getElementById("toc");
    const tocList = document.getElementById("toc-list");
    const tocToggle = document.getElementById("toc-toggle");

    if (!toc || !tocList || !tocToggle)
        return;

    const headings = [...document.querySelectorAll("main h1")];

    if (!headings.length) {
        tocToggle.hidden = true;
        toc.hidden = true;
        return;
    }

    headings.forEach((heading, index) => {

        if (!heading.id)
            heading.id = `section-${index + 1}`;

        const li = document.createElement("li");

        const a = document.createElement("a");
        a.href = "#" + heading.id;
        a.textContent = heading.textContent.trim();

        li.appendChild(a);
        tocList.appendChild(li);
    });

    toc.hidden = true;

    tocToggle.addEventListener("click", () => {

        toc.hidden = !toc.hidden;

        tocToggle.innerHTML = toc.hidden
            ? '<i class="bi bi-list"></i><span>Contents</span>'
            : '<i class="bi bi-x-lg"></i><span>Contents</span>';

    });

    toc.addEventListener("click", e => {

        if (e.target.tagName === "A") {
            toc.hidden = true;
            tocToggle.innerHTML =
                '<i class="bi bi-list"></i><span>Contents</span>';
        }

    });

});
</script>
{% endif %}
{{ content }}
</main>

</div>

<script>
const btn=document.getElementById("theme-toggle");

btn.onclick=()=>{
    const html=document.documentElement;
    const next=html.dataset.theme==="dark"?"light":"dark";
    html.dataset.theme=next;
    localStorage.setItem("theme",next);
};
</script>
