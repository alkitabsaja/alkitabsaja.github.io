<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}

  {% if site.favicon %}
  <link rel="icon" href="{{ site.favicon | relative_url }}">
  {% endif %}

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script>
    (() => {
      const saved = localStorage.getItem("theme");
      if (saved) {
        document.documentElement.dataset.theme = saved;
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.dataset.theme = "dark";
      } else {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
</head>

<body>

<div class="container">

<nav class="nav">

<a class="nav-brand" href="{{ '/' | relative_url }}">
{% if site.logo %}
<img class="nav-logo" src="{{ site.logo | relative_url }}" alt="">
{% endif %}
<span>{{ site.title }}</span>
</a>

<div class="nav-links">
{% for item in site.nav %}
<a href="{{ item.url | relative_url }}"
{% if page.url == item.url %}class="active"{% endif %}>
{{ item.title }}
</a>
{% endfor %}

<button id="theme-toggle" class="theme-toggle" title="Toggle theme">
<i class="bi bi-moon-stars"></i>
</button>

</div>

</nav>

<main class="content">
<button id="toc-toggle" class="toc-toggle">
  <i class="bi bi-list"></i> Contents
</button>

<nav id="toc" class="toc" hidden>
  <strong>Contents</strong>
  <ul id="toc-list"></ul>
</nav>
{{ content }}
</main>

</div>

<script>
const btn=document.getElementById("theme-toggle");

btn.onclick=()=>{
    const html=document.documentElement;
    const next=html.dataset.theme==="dark"?"light":"dark";
    html.dataset.theme=next;
    localStorage.setItem("theme",next);
};
</script>
<script>
(() => {

const toc = document.getElementById("toc");
const list = document.getElementById("toc-list");
const btn = document.getElementById("toc-toggle");

const headings = document.querySelectorAll(
  ".content h1, .content h2, .content h3, .content h4"
);

if (!headings.length) {
    btn.style.display = "none";
    return;
}

headings.forEach((h, i) => {

    if (!h.id) {
        h.id = "section-" + (i + 1);
    }

    const li = document.createElement("li");
    li.className = "toc-" + h.tagName.toLowerCase();

    li.innerHTML = `<a href="#${h.id}">${h.textContent}</a>`;

    list.appendChild(li);
});

btn.onclick = () => {
    toc.hidden = !toc.hidden;
};

})();
</script>

</html>
