name: Build Ebooks
permissions:
  contents: write
on: 
  push:
    paths: ['docs/**.md']
  workflow_dispatch: # lets you run manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push back to gh-pages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended
          
      - name: Build PDF
        run: |
          mkdir -p _site/assets
          pandoc docs/*.md -o _site/assets/ebook.pdf --pdf-engine=xelatex --toc
          
      - name: Build EPUB  
        run: pandoc docs/*.md -o _site/assets/ebook.epub --toc
        
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site/assets
          destination_dir: assets
          keep_files: true
