name: Build Ebooks

permissions:
  contents: write

on:
  push:
    paths:
      - "_docs/**/*.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended

      - name: Build PDFs & EPUBs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ebooks
          shopt -s globstar nullglob

          for src in _docs/**/*.md; do
            rel="${src#_docs/}"
            out="${rel%.md}"

            mkdir -p "ebooks/$(dirname "$out")"

            echo "Building $rel"

            pandoc "$src" \
              --resource-path=".:_docs:assets:images" \
              --pdf-engine=xelatex \
              --include-in-header=latex/header.tex \
              --top-level-division=chapter \
              -V documentclass=book \
              -V papersize:a5 \
              -V geometry:margin=10mm \
              --toc \
              -o "ebooks/${out}.pdf"

            pandoc "$src" \
              --toc \
              -o "ebooks/${out}.epub"
          done

      - name: Show generated files
        run: find ebooks -type f | sort

      - name: Commit generated ebooks
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ebooks

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Build ebooks"
          git push
