name: Build Ebooks

permissions:
  contents: write

on:
  push:
    paths: ['_docs/**.md']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          # persist-credentials=true allows pushes with GITHUB_TOKEN
          
      - name: Install Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended
          
      - name: Build individual PDFs & EPUBs
        run: |
          set -e
          mkdir -p ebooks
          shopt -s nullglob || true
          for src in _docs/*.md; do
            fname="$(basename "$src" .md)"
            echo "Building $fname"
            # ensure each top-level chapter (H1) starts on a new page in PDF
            tmpfile="$(mktemp)"
            # insert a LaTeX pagebreak before lines that start with a top-level header (# ) except if it's the first line
            awk 'NR==1{print; next} /^# /{print "\\newpage"; print; next} {print}' "$src" > "$tmpfile"
            # produce A5 PDF with smaller margins
            pandoc "$tmpfile" -o "ebooks/${fname}.pdf" --pdf-engine=xelatex -V papersize:a5 -V geometry:margin=10mm --toc || true
            # produce EPUB from original markdown
            pandoc "$src" -o "ebooks/${fname}.epub" --toc || true
            rm -f "$tmpfile"
          done

      - name: List generated files
        run: |
          ls -lah ebooks || true

      - name: Commit and push generated ebooks back to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ebooks || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build ebooks: update PDFs and EPUBs"
            git push origin HEAD:main
          fi
