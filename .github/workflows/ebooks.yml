- name: Build individual PDFs & EPUBs
  run: |
    set -e

    mkdir -p ebooks

    shopt -s globstar nullglob

    for src in _docs/**/*.md; do
      rel="${src#_docs/}"
      out="${rel%.md}"

      mkdir -p "ebooks/$(dirname "$out")"

      echo "Building $rel"

      pandoc "$src" \
        -o "ebooks/${out}.pdf" \
        --pdf-engine=xelatex \
        --top-level-division=chapter \
        -V documentclass=book \
        -V papersize:a5 \
        -V geometry:margin=10mm \
        --toc || true

      pandoc "$src" \
        -o "ebooks/${out}.epub" \
        --toc || true
    done
